<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Quote Submission Form</title>\n</head>\n<body>\n    <h1>Quote Submission Form</h1>\n    <form action="/submit_quote" method="POST">\n        <label for="product">Product:</label>\n        <select id="product" name="product" required>\n            <option value="Product A">Product A</option>\n            <option value="Product B">Product B</option>\n            <option value="Product C">Product C</option>\n            <!-- Add other products here in alphabetical order -->\n        </select>\n        <br><br>\n        <label for="moq">Minimum Order Quantity (MOQ):</label>\n        <input type="number" id="moq" name="moq" required>\n        <select name="unit" required>\n            <option value="kg">kg</option>\n            <option value="lb">lb</option>\n        </select>\n        <br><br>\n        <label for="target_price">Target Price:</label>\n        <input type="number" id="target_price" name="target_price" step="0.01" required>\n        <br><br>\n        <label for="annual_quantity">Annual Quantity:</label>\n        <input type="number" id="annual_quantity" name="annual_quantity" required>\n        <br><br>\n        <label for="sample_request">Request Sample:</label>\n        <input type="checkbox" id="sample_request" name="sample_request">\n        <br><br>\n        <input type="submit" value="Submit">\n    </form>\n</body>\n</html>
